# Nasazení na webhosting přes FTP po pushi na main.
# V repozitáři: Settings → Secrets and variables → Actions → New repository secret
#
# Povinné secrets:
#   FTP_SERVER     – např. wXXXX.wedos.ws nebo ftp.tomaskrupicka.cz
#   FTP_USERNAME   – přihlašovací jméno FTP
#   FTP_PASSWORD   – heslo FTP
#   FTP_SERVER_DIR – cílová složka na serveru (s koncovým /), např. www/meteostanice-padarovice/
#                    přesná cesta závisí na panelu hostingu (Wedos: často www/nazev-domeny/subdir/)

name: Deploy FTP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy přes FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Neposílat zbytečnosti na hosting
          exclude: |
            **/.git*
            **/.github/**
            config.example.php
